[program:worker-transfer]
command=python -m shared.worker
directory=/app/worker
autostart=true
autorestart=true
startretries=5
numprocs=%(ENV_SHS_TRANSFER_WORKERS)s
startsecs=5
process_name=%(program_name)s_%(process_num)02d
stderr_logfile=/var/log/supervisor/%(program_name)s_stderr.log
stderr_logfile_maxbytes=10MB
stdout_logfile=/var/log/supervisor/%(program_name)s_stdout.log
stdout_logfile_maxbytes=10MB
priority=51
; Same graceful-shutdown contract as worker-general.
stopsignal=TERM
stopwaitsecs=15
stopasgroup=true
killasgroup=true
environment=SHS_WORKER_TYPE="transfer",SHS_WORKSPACE_ROOT="/workspace",SHS_API_BASE_URL="http://localhost:8000",PATH="/app/api/.venv/bin:/usr/local/bin:/usr/bin:/bin",PYTHONPATH="/app/worker:/app"
