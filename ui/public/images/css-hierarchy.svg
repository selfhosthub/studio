<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold" fill="#333">CSS Hierarchy and Cascade Flow</text>
  
  <!-- CSS Specificity Pyramid -->
  <g transform="translate(400, 320)">
    <!-- Pyramid levels -->
    <polygon points="-300,150 300,150 200,-150 -200,-150" fill="#e9ecef" stroke="#495057" stroke-width="2" />
    
    <!-- Level separators -->
    <line x1="-250" y1="100" x2="250" y2="100" stroke="#495057" stroke-width="2" />
    <line x1="-200" y1="50" x2="200" y2="50" stroke="#495057" stroke-width="2" />
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#495057" stroke-width="2" />
    <line x1="-100" y1="-50" x2="100" y2="-50" stroke="#495057" stroke-width="2" />
    <line x1="-50" y1="-100" x2="50" y2="-100" stroke="#495057" stroke-width="2" />
    
    <!-- Level labels -->
    <g font-family="Arial" font-size="14" text-anchor="middle" fill="#212529">
      <text x="0" y="125" font-weight="bold">Browser Defaults</text>
      <text x="0" y="75" font-weight="bold">Element Selectors (h1, p, div)</text>
      <text x="0" y="25" font-weight="bold">Class Selectors (.container, .btn)</text>
      <text x="0" y="-25" font-weight="bold">ID Selectors (#header, #main)</text>
      <text x="0" y="-75" font-weight="bold">Inline Styles (style="...")</text>
      <text x="0" y="-125" font-weight="bold">!important</text>
    </g>
    
    <!-- Specificity indicator -->
    <text x="-280" y="-140" font-family="Arial" font-size="16" text-anchor="start" font-weight="bold" fill="#dc3545">Higher Specificity</text>
    <text x="-280" y="140" font-family="Arial" font-size="16" text-anchor="start" font-weight="bold" fill="#28a745">Lower Specificity</text>
  </g>
  
  <!-- CSS Variables Flow -->
  <g transform="translate(400, 120)">
    <rect x="-350" y="-70" width="700" height="50" rx="5" fill="#c5e8f7" stroke="#0d6efd" stroke-width="2" />
    <text x="0" y="-40" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold" fill="#0d6efd">:root { --theme-primary: blue; }</text>
    
    <!-- Arrows -->
    <line x1="0" y1="-20" x2="0" y2="0" stroke="#0d6efd" stroke-width="2" />
    <polygon points="-5,0 5,0 0,10" fill="#0d6efd" />
    
    <!-- Child elements -->
    <g transform="translate(-175, 30)">
      <rect x="-100" y="-20" width="200" height="40" rx="5" fill="#d7f3e3" stroke="#198754" stroke-width="2" />
      <text x="0" y="5" font-family="Arial" font-size="14" text-anchor="middle" fill="#198754">body { background: var(--theme-primary); }</text>
    </g>
    
    <g transform="translate(175, 30)">
      <rect x="-100" y="-20" width="200" height="40" rx="5" fill="#d7f3e3" stroke="#198754" stroke-width="2" />
      <text x="0" y="5" font-family="Arial" font-size="14" text-anchor="middle" fill="#198754">header { color: var(--theme-primary); }</text>
    </g>
    
    <!-- More arrows -->
    <line x1="-175" y1="50" x2="-175" y2="70" stroke="#198754" stroke-width="2" />
    <polygon points="-180,70 -170,70 -175,80" fill="#198754" />
    
    <line x1="175" y1="50" x2="175" y2="70" stroke="#198754" stroke-width="2" />
    <polygon points="170,70 180,70 175,80" fill="#198754" />
    
    <!-- Nested elements -->
    <g transform="translate(-175, 100)">
      <rect x="-125" y="-20" width="250" height="40" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="2" />
      <text x="0" y="5" font-family="Arial" font-size="14" text-anchor="middle" fill="#664d03">button { background: var(--theme-primary); }</text>
    </g>
    
    <g transform="translate(175, 100)">
      <rect x="-125" y="-20" width="250" height="40" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="2" />
      <text x="0" y="5" font-family="Arial" font-size="14" text-anchor="middle" fill="#664d03">.navbar { border-color: var(--theme-primary); }</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 540)">
    <text font-family="Arial" font-size="16" text-anchor="start" font-weight="bold" fill="#333">Key Concepts:</text>
    <text x="10" y="25" font-family="Arial" font-size="14" text-anchor="start" fill="#333">• Specificity: More specific selectors override less specific ones</text>
    <text x="10" y="50" font-family="Arial" font-size="14" text-anchor="start" fill="#333">• Inheritance: Child elements inherit properties from parents</text>
    <text x="450" y="25" font-family="Arial" font-size="14" text-anchor="start" fill="#333">• CSS Variables: Set at root level, accessible everywhere</text>
    <text x="450" y="50" font-family="Arial" font-size="14" text-anchor="start" fill="#333">• Cascade: Later styles override earlier ones</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="#f8f9fa" rx="5" ry="5" />
  
  <!-- Pyramid -->
  <polygon points="100,450 700,450 600,50 200,50" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
  
  <!-- Levels -->
  <rect x="100" y="400" width="600" height="50" fill="#ef4444" fill-opacity="0.8" />
  <rect x="125" y="350" width="550" height="50" fill="#f59e0b" fill-opacity="0.8" />
  <rect x="150" y="300" width="500" height="50" fill="#10b981" fill-opacity="0.8" />
  <rect x="175" y="250" width="450" height="50" fill="#3b82f6" fill-opacity="0.8" />
  <rect x="200" y="200" width="400" height="50" fill="#8b5cf6" fill-opacity="0.8" />
  <rect x="225" y="150" width="350" height="50" fill="#ec4899" fill-opacity="0.8" />
  <rect x="250" y="100" width="300" height="50" fill="#6366f1" fill-opacity="0.8" />
  <rect x="275" y="50" width="250" height="50" fill="#0f172a" fill-opacity="0.8" />
  
  <!-- Text -->
  <text x="400" y="430" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Browser Default Styles</text>
  <text x="400" y="380" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Element Selectors (p, div, h1)</text>
  <text x="400" y="330" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Class Selectors (.class)</text>
  <text x="400" y="280" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Attribute Selectors ([type=text])</text>
  <text x="400" y="230" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Pseudo-classes (:hover)</text>
  <text x="400" y="180" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">ID Selectors (#id)</text>
  <text x="400" y="130" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Inline Styles (style="...")</text>
  <text x="400" y="80" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">!important</text>
  
  <!-- Labels -->
  <text x="50" y="250" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#059669" transform="rotate(-90, 50, 250)">Lower Specificity</text>
  <text x="50" y="150" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#dc2626" transform="rotate(-90, 50, 150)">Higher Specificity</text>
  
  <!-- Title -->
  <text x="400" y="25" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#0f172a">CSS Specificity Pyramid</text>
</svg>
